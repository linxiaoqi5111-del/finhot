# 红线硬拦截：阻止提交密钥 / 大文件 / 缓存等危险文件。
# 新机首次启用：  pip install pre-commit && pre-commit install
# 之后每次 git commit 自动检查；命中红线则提交失败。
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key            # 内容里出现私钥 -> 拦截
      - id: check-added-large-files       # 新增大文件 -> 拦截
        args: ["--maxkb=5120"]
      - id: check-merge-conflict          # 残留冲突标记 -> 拦截
  - repo: local
    hooks:
      - id: block-forbidden-files
        name: "红线：禁止提交 .env/密钥/大二进制/缓存"
        language: fail
        entry: "红线命中：该文件不允许提交（.env* / *.pem|key / *.pdf|zip|duckdb|db / .DS_Store / __pycache__）。如确需提交请人工确认并 git commit --no-verify。"
        files: '(^|/)(\.env($|\..+)|.*\.pem$|.*\.key$|.*\.pdf$|.*\.zip$|.*\.duckdb$|.*\.db$|\.DS_Store$|__pycache__/)'
        exclude: '\.env\.(example|sample|template)$'
